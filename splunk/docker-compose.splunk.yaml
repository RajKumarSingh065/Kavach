
services:
  splunk:
    image: splunk/splunk:latest
    container_name: kavach-splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=KavachAdmin@2026
      - SPLUNK_HEC_TOKEN=kavach-hec-token-2026
    ports:
      - "8000:8000"   # Splunk Web UI
      - "8088:8088"   # HEC endpoint
      - "8089:8089"   # Management API
    volumes:
      - splunk-data:/opt/splunk/var
      - ./savedsearches.conf:/opt/splunk/etc/apps/search/local/savedsearches.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  splunk-data:
