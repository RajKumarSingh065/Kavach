# ============================================================================
# Kavach — Splunk Saved Searches for Insider Threat Hunting
# ============================================================================
# These searches run against the kavach_events index and drive the
# SIEM alerting pipeline. Deploy to:
#   $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
# ============================================================================

[Kavach - Critical Severity Alert]
search = index=kavach_events sourcetype=_json severity>=8 | table _time, userId, username, action, resource, severity, classification, sourceIp, threatTags
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */2 * * * *
is_scheduled = 1
enableSched = 1
description = Triggers when any event with severity 8-10 is recorded on the blockchain

[Kavach - Anomalous Hours Access]
search = index=kavach_events sourcetype=_json (threatTags="AFTER_HOURS") | table _time, userId, username, action, resource, severity, sourceIp
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
description = Detects access outside of normal working hours (22:00-06:00)

[Kavach - Bulk Data Access Pattern]
search = index=kavach_events sourcetype=_json action="BULK_DOWNLOAD" OR action="DATA_EXFILTRATION" | stats count by userId, username | where count > 3
dispatch.earliest_time = -10m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */3 * * * *
is_scheduled = 1
enableSched = 1
description = Detects users performing multiple bulk data operations in a short period

[Kavach - Privilege Escalation Attempt]
search = index=kavach_events sourcetype=_json (action="PRIVILEGE_ESCALATION" OR action="POLICY_OVERRIDE") | table _time, userId, username, resource, severity, sourceIp
dispatch.earliest_time = -10m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
description = Detects privilege escalation or security policy override attempts

[Kavach - Flagged User Activity]
search = index=kavach_events sourcetype=_json (threatTags="FLAGGED_USER_ACTIVITY") | table _time, userId, username, action, resource, severity, classification
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */2 * * * *
is_scheduled = 1
enableSched = 1
description = Any activity by a user who has been flagged as suspicious

[Kavach - Classified Document Access]
search = index=kavach_events sourcetype=_json (classification="TOP_SECRET" OR classification="SECRET") severity>=5 | table _time, userId, username, action, resource, severity, classification, sourceIp
dispatch.earliest_time = -10m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
cron_schedule = */5 * * * *
is_scheduled = 1
enableSched = 1
description = Suspicious access to classified (SECRET/TOP_SECRET) resources

[Kavach - System Tampering Detection]
search = index=kavach_events sourcetype=_json (action="SYSTEM_TAMPERING" OR action="EVIDENCE_DELETION") | table _time, userId, username, action, resource, severity, sourceIp
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
cron_schedule = */2 * * * *
is_scheduled = 1
enableSched = 1
description = Critical alert for system tampering or evidence destruction attempts

[Kavach - Risk Score Dashboard]
search = index=kavach_events sourcetype=_json | stats sum(riskScore) as totalRisk, count as eventCount, max(severity) as maxSeverity by userId, username | sort -totalRisk | head 20
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_scheduled = 0
description = Dashboard panel showing top 20 users by cumulative risk score

[Kavach - Event Timeline]
search = index=kavach_events sourcetype=_json | timechart span=5m count by severity
dispatch.earliest_time = -4h
dispatch.latest_time = now
is_scheduled = 0
description = Dashboard panel showing event volume over time by severity level
